repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: '^ui/tsconfig\..*\.json$'
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy -p lablog
        language: system
        types: [python]
        pass_filenames: false

      - id: tsc
        name: tsc
        entry: sh -c "cd ui && npx tsc --noEmit"
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false

      - id: oxlint
        name: oxlint
        entry: sh -c "cd ui && npm run lint"
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false
