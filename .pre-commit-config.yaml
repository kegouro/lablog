repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format src tests
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy -p lablog
        language: system
        types: [python]
        pass_filenames: false

      - id: oxlint
        name: oxlint
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-tests
        name: frontend-tests
        entry: bash -c 'cd ui && npm test'
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false
